# From-scratch chatbot architecture and training defaults

chatbot:
  name: custom-chatbot
  version: "1.0.0"
  system_prompt: |
    You are a helpful AI assistant built from scratch. You excel at software engineering,
    RAG systems, debugging, architecture, and clear technical explanations.

tokenizer:
  vocab_size: 32000
  min_frequency: 2
  special_tokens:
    - "<|pad|>"
    - "<|bos|>"
    - "<|eos|>"
    - "<|user|>"
    - "<|assistant|>"
    - "<|system|>"
    - "<|tool|>"
    - "<|tool_result|>"
    - "<|think|>"
    - "<|/think|>"

model:
  # Small but capable default (~85M params). Scale up for production.
  vocab_size: 32000
  max_seq_len: 2048
  d_model: 768
  n_heads: 12
  n_layers: 12
  d_ff: 3072
  dropout: 0.1
  rope_theta: 10000.0

training:
  pretrain:
    output_dir: outputs/pretrain
    batch_size: 8
    gradient_accumulation: 4
    learning_rate: 3.0e-4
    warmup_steps: 1000
    max_steps: 50000
    eval_every: 500
    save_every: 1000
    mixed_precision: true

  sft:
    output_dir: outputs/sft
    batch_size: 4
    gradient_accumulation: 8
    learning_rate: 2.0e-5
    epochs: 3
    max_seq_len: 2048
    mixed_precision: true

inference:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1

data:
  raw_corpus_glob: "knowledge-base/**/*.md"
  train_file: data/advanced/train.jsonl
  val_file: data/advanced/val.jsonl
  test_file: data/advanced/test.jsonl
  pretrain_file: data/advanced/pretrain.txt

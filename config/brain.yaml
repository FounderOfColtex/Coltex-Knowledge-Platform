# Coltex configuration — Living Brain

knowledge_base:
  paths:
    - knowledge-base
    - knowledge-base/living-brain
    - knowledge-base/distributable/_samples
  glob: "**/*.md"
  exclude:
    - "**/_seed/**"
    - "**/_excluded_from_distribution/**"
    - "**/generated/**"

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2

vector_store:
  persist_dir: data/brain/vector_store
  collection_name: coltex

graph:
  enabled: true
  max_hops: 3
  max_extra_chunks: 12

retrieval:
  vector_top_k: 12
  metadata_top_k: 10
  final_top_k: 10
  max_context_chars: 16000
  source_weights:
    vector: 1.0
    metadata: 0.85
    graph: 0.70

document_types:
  - documentation
  - faq
  - api_reference
  - architecture_decision
  - design_document
  - runbook
  - troubleshooting
  - code_walkthrough
  - sql_example
  - database_schema
  - migration_guide
  - incident_report
  - code_review
  - guide
  - tutorial
  - benchmark
  - evaluation
  - best_practices
  - deep_dive
  - anti_patterns
  - case_study

relationship_types:
  - depends_on
  - uses
  - implements
  - calls
  - owned_by
  - documents
  - fixes
  - replaces
  - see_also

knowledge_hubs:
  - auth_service
  - indexing_pipeline
  - graphrag_engine
  - payment_service
  - ci_cd_platform
  - coltex_living_brain

model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  load_in_4bit: true
  use_chat_template: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/advanced/train.jsonl
  val_file: data/advanced/val.jsonl

training:
  output_dir: outputs/zyphersft
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  max_seq_length: 2048
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  save_total_limit: 2
  gradient_checkpointing: true
  packing: false
  bf16: true
  seed: 42
  report_to: none

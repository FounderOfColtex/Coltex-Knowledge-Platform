# Zypher — curated seed documents only

knowledge_base:
  paths:
    - knowledge-base
  glob: "CHUNK-*.md"
  exclude:
    - "**/generated/**"
    - "**/_seed/**"
    - "**/_excluded_from_distribution/**"
    - "**/distributable/**"

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2

vector_store:
  persist_dir: data/brain/vector_store_curated
  collection_name: zypher_curated

graph:
  enabled: true
  max_hops: 2
  max_extra_chunks: 8

retrieval:
  vector_top_k: 10
  metadata_top_k: 8
  final_top_k: 8
  max_context_chars: 14000
  source_weights:
    vector: 1.0
    metadata: 0.85
    graph: 0.65

document_types:
  - documentation
  - faq
  - api_reference
  - architecture_decision
  - runbook
  - troubleshooting
  - code_walkthrough

relationship_types:
  - depends_on
  - uses
  - see_also

knowledge_hubs:
  - graphrag_engine
  - indexing_pipeline

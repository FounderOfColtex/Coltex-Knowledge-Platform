# MEGA Coltex corpus — hyper-scale generation
# mega_multiplier maps to tiers (see scripts/mega_scale.py)

seed_dir: knowledge-base
output_dir: knowledge-base/generated

scale: 10000
variations_per_doc: 24
mega_multiplier: 100000000000   # hyper tier → billions of documents
parallel_workers: 16
batch_size: 1000

# Set max_files via CLI: --max-files 100000 (safety cap)
# Full hyper run on Vast.ai:
#   python3 scripts/generate_corpus.py --config config/corpus_mega.yaml --max-files 0 --skip-wiring

categories:

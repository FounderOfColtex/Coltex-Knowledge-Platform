<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coltex Knowledge Studio</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --accent:#3b82f6; --green:#22c55e; --warn:#f59e0b; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 1.25rem 2rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { color: var(--muted); font-size: 0.875rem; }
    nav { display: flex; gap: 0.5rem; padding: 0.75rem 2rem; border-bottom: 1px solid #334155; flex-wrap: wrap; }
    nav button { background: var(--card); border: 1px solid #334155; color: var(--text); padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    nav button.active { background: var(--accent); border-color: var(--accent); }
    main { padding: 1.5rem 2rem; max-width: 1200px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .metric { background: var(--card); border-radius: 10px; padding: 1rem; border: 1px solid #334155; }
    .metric label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .metric value { font-size: 1.75rem; font-weight: 700; }
    .metric value.good { color: var(--green); }
    .metric value.warn { color: var(--warn); }
    section { background: var(--card); border-radius: 10px; padding: 1rem 1.25rem; border: 1px solid #334155; margin-bottom: 1rem; }
    section h2 { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .alert { padding: 0.6rem 0.75rem; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.875rem; background: #1e293b; border-left: 3px solid var(--warn); }
    .alert.high { border-left-color: #ef4444; }
    input[type=text] { width: 100%; max-width: 480px; padding: 0.6rem; border-radius: 6px; border: 1px solid #334155; background: #0f1419; color: var(--text); margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    td, th { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #334155; }
    th { color: var(--muted); font-weight: 500; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Knowledge Studio</h1>
    <span>Coltex Knowledge OS · Runtime Active</span>
  </header>
  <nav id="nav">
    <button class="active" data-panel="health">Health</button>
    <button data-panel="curator">Curator</button>
    <button data-panel="monitor">Monitor</button>
    <button data-panel="explorer">Explorer</button>
    <button data-panel="search">Search</button>
    <button data-panel="explain">Explain</button>
    <button data-panel="connectors">Connectors</button>
  </nav>
  <main>
    <div id="panel-health">
      <div class="grid" id="health-metrics"></div>
    </div>
    <div id="panel-curator" class="hidden">
      <section><h2>AI Curator — Proactive Alerts</h2><div id="curator-list"></div></section>
    </div>
    <div id="panel-monitor" class="hidden">
      <div class="grid" id="monitor-metrics"></div>
    </div>
    <div id="panel-explorer" class="hidden">
      <section><h2>Knowledge Explorer</h2><table><thead><tr><th>ID</th><th>Title</th><th>Quality</th><th>Memory</th></tr></thead><tbody id="explorer-body"></tbody></table></section>
    </div>
    <div id="panel-search" class="hidden">
      <section><h2>Search</h2><input type="text" id="search-q" placeholder="Search knowledge objects..." /><div id="search-results"></div></section>
    </div>
    <div id="panel-explain" class="hidden">
      <section><h2>Explainability — Why did Coltex retrieve this?</h2><input type="text" id="explain-q" placeholder="Ask a question..." /><div id="explain-results"></div></section>
    </div>
    <div id="panel-connectors" class="hidden">
      <section><h2>Connectors</h2><div id="connector-list"></div></section>
    </div>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    const panels = ['health','curator','monitor','explorer','search','explain','connectors'];
    document.getElementById('nav').addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') return;
      panels.forEach(p => { $('#panel-'+p).classList.add('hidden'); });
      $('#panel-'+e.target.dataset.panel).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
    });
    async function api(path) { const r = await fetch(path); return r.json(); }
    function metric(label, val, cls='') {
      return `<div class="metric"><label>${label}</label><value class="${cls}">${val}</value></div>`;
    }
    async function loadHealth() {
      const h = await api('/api/health');
      $('#health-metrics').innerHTML = [
        metric('Knowledge Score', h.knowledge_score + '%', 'good'),
        metric('Coverage', h.coverage + '%', 'good'),
        metric('Freshness', h.freshness + '%'),
        metric('Duplicate Risk', h.duplicate_risk + '%', h.duplicate_risk > 10 ? 'warn' : ''),
        metric('Graph Integrity', h.graph_integrity + '%', 'good'),
        metric('Broken References', h.broken_references, h.broken_references > 0 ? 'warn' : 'good'),
        metric('Disconnected Graphs', h.disconnected_graphs ?? 0),
      ].join('');
    }
    async function loadCurator() {
      const c = await api('/api/curator');
      $('#curator-list').innerHTML = (c.alerts || []).map(a =>
        `<div class="alert ${a.severity}"><strong>${a.title}</strong><br>${a.message}${a.action ? '<br><em>Action: '+a.action+'</em>' : ''}</div>`
      ).join('') || '<p style="color:#94a3b8">No alerts — knowledge base looks healthy.</p>';
    }
    async function loadMonitor() {
      const m = await api('/api/monitor');
      const k = m.knowledge || {}, r = m.runtime || {}, p = m.pipeline || {};
      $('#monitor-metrics').innerHTML = [
        metric('CPU', (r.cpu_percent||0) + '%'),
        metric('Memory', (r.memory_mb||0) + ' MB'),
        metric('Documents', k.documents||0),
        metric('Embeddings', k.embeddings||0),
        metric('Graph Edges', k.graph_edges||0),
        metric('Events/sec', p.events_per_sec||0),
        metric('Search Latency', (p.search_latency_ms||'—') + (p.search_latency_ms ? ' ms' : '')),
        metric('Knowledge Score', (m.health?.knowledge_score||'—') + (m.health?.knowledge_score ? '%' : '')),
      ].join('');
    }
    async function loadExplorer() {
      const e = await api('/api/explorer?limit=15');
      $('#explorer-body').innerHTML = (e.objects||[]).map(o =>
        `<tr><td>${o.id}</td><td>${o.title||'—'}</td><td>${Math.round((o.quality_score||0)*100)}%</td><td>${o.memory_tier||'—'}</td></tr>`
      ).join('');
    }
    $('#search-q').addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      const r = await api('/api/search?q=' + encodeURIComponent(e.target.value));
      $('#search-results').innerHTML = (r.results||[]).map(x =>
        `<div class="alert"><strong>${x.title}</strong> (${x.score})</div>`
      ).join('');
    });
    $('#explain-q').addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      const r = await api('/api/explain?q=' + encodeURIComponent(e.target.value));
      $('#explain-results').innerHTML = (r.results||[]).map(x =>
        `<div class="alert"><strong>${x.title}</strong><br>${x.summary}<ul>${(x.why||[]).map(w=>'<li>'+w.label+(w.score?': '+w.score+'%':'')+(w.detail?' — '+w.detail:'')+'</li>').join('')}</ul></div>`
      ).join('');
    });
    async function loadConnectors() {
      const c = await api('/api/connectors');
      $('#connector-list').innerHTML = (c.connectors||[]).map(x =>
        `<div class="alert"><strong>${x.name}</strong> (${x.id})</div>`
      ).join('');
    }
    loadHealth(); loadCurator(); loadMonitor(); loadExplorer(); loadConnectors();
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
